<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB Visa Services | Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="login-card">

    <div class="logo">
        <h1>CB</h1>
        <span>CB Visa Services</span>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to access your visa application dashboard.</p>

    <form>

        <label>Email Address</label>
        <input type="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" placeholder="Enter your password">

        <div class="options">
            <label>
                <input type="checkbox">
                Remember me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Sign In</button>

    </form>

    <div class="divider">
        <span>OR</span>
    </div>

    <button class="secondary">
        Create New Account
    </button>

    <p class="footer">
        © 2026 CB Visa Services. All Rights Reserved.
    </p>

</div>

</body>
</html>
