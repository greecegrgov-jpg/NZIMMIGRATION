<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NZL Visa Admin Panel</title>

    <link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="login-box">

    <img src="images/logo.png" class="logo" alt="NZL Visa">

    <h1>NZL Visa Admin</h1>

    <p>Administrator Login</p>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button id="loginBtn">

        Login

    </button>

    <div id="message"></div>

</div>

<script src="admin.js"></script>

</body>

</html>
