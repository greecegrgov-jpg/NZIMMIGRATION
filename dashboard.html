<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NZL Visa Dashboard</title>

    <link rel="stylesheet" href="admin.css">

</head>

<body>

    <div class="dashboard">

        <!-- =========================
             LEFT SIDEBAR
        ========================== -->

        <div class="admin-sidebar">

            <h2>NZL Visa</h2>

            <ul>

                <li id="addVisa">➕ Add New Visa</li>

                <li id="records">📋 Visa Records</li>

                <li id="search">🔍 Search</li>

                <li id="logout">🚪 Logout</li>

            </ul>

        </div>

        <!-- =========================
             RIGHT CONTENT
        ========================== -->

        <div class="admin-content">

            <div id="pageContent">

                <h1>Dashboard</h1>

                <div class="cards">

                    <div class="stat-card">

                        <h3>Total Visa Records</h3>

                        <h2>1</h2>

                    </div>

                    <div class="stat-card">

                        <h3>Uploaded PDFs</h3>

                        <h2>1</h2>

                    </div>

                    <div class="stat-card">

                        <h3>Valid Records</h3>

                        <h2>1</h2>

                    </div>

                </div>

                <div class="records-card">

                    <h2>Recent Visa Records</h2>

                    <table class="records-table">

                        <thead>

                            <tr>

                                <th>Family Name</th>

                                <th>Passport</th>

                                <th>Nationality</th>

                                <th>Status</th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr>

                                <td>Husnain Ali</td>

                                <td>SU1819363</td>

                                <td>Pakistan</td>

                                <td style="color:green;font-weight:bold;">
                                    VALID
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="dashboard.js"></script>

</body>

</html>
